name: Ensure LibTooling
description: Make sure LibTooling is present before building
inputs:
  os:
    description: Operating system
    required: true
  arch:
    description: Architecture
    required: true
  script:
    description: "Script file name"
    required: true
runs:
  using: "composite"
  steps:
    - name: Check cache
      id: check-cache
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # 5.0.5
      with:
        path: |
          3rd-party/llvm
          3rd-party/clang
        key: Libtooling-22.1.6-${{ inputs.os }}-${{ inputs.arch }}
    - name: Build (Windows)
      if: steps.check-cache.outputs.cache-hit != 'true' && inputs.os == 'windows'
      shell: pwsh
      working-directory: scripts/libtooling
      run: |
        cmake -P GetLlvm.cmake
        ./${{ matrix.script }}
    - name: Build (not Windows)
      if: steps.check-cache.outputs.cache-hit != 'true' && inputs.os != 'windows'
      shell: bash
      working-directory: scripts/libtooling
      run: |
        cmake -P GetLlvm.cmake
        ./${{ matrix.script }}
    - name: Cache build
      if: steps.check-cache.outputs.cache-hit != 'true'
      uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # 5.0.5
      with:
        path: |
          3rd-party/llvm
          3rd-party/clang
        key: ${{ steps.check-cache.outputs.cache-primary-key }}
