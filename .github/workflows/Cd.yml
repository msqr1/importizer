name: Tag Release
on: workflow_dispatch
jobs:
  jobMatrix:
    uses: ./.github/workflows/JobMatrix.yml
    with:
      checkCi: true
  make:
    permissions:
      contents: write
    needs: jobMatrix
    strategy:
      matrix:
        include: ${{ fromJSON(needs.jobMatrix.outputs.m) }}
    runs-on: ${{ matrix.runner }}
    name: ${{ matrix.os }}-${{ matrix.arch }}
    container: ${{ matrix.container || '' }}
    steps:
      - name: Checkout
        uses: taiki-e/checkout-action@v1.4.2
      - name: Setup environment
        run: . scripts/setup-env/${{ matrix.setup-env }} ${{ matrix.arch }}
      - name: Ensure LibTooling
        run: cmake -P scripts/EnsureLibtooling.cmake
      - name: Make distribution
        run: cmake -P scripts/MkDist.cmake Release
      - name: Upload as artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # 7.0.1
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ matrix.os }}-${{ matrix.arch }}.zst
          retention-days: 1
          compression-level: 0
          if-no-files-found: error
  tagRelease:
    permissions:
      contents: write
      repository-projects: write
    needs: make
    runs-on: ubuntu-slim
    env:
      GH_TOKEN: ${{ github.token }}
      repo: ${{ github.repository }}
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          merge-multiple: true
          path: dists
      - name: Create & upload to release
        run: |
          v=3.0.0
          gh release create $v dists/*
            -d \
            -t $v \
            -n "[Change log](https://github.com/$repo/blob/main/ChangeLog.adoc#${v//./})" \
            -R $repo
