name: Tag Continuous
on:
  - push
  - workflow_dispatch
jobs:
  jobMatrix:
    uses: ./.github/workflows/JobMatrix.yml
  all:
    permissions:
      contents: write
    needs: jobMatrix
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.jobMatrix.outputs.m) }}
    runs-on: ${{ matrix.runner }}
    name: ${{ matrix.os }}-${{ matrix.arch }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Setup
          . scripts/setup-env/${{ matrix.script }} ${{ matrix.arch }}

          # Ensure LibTooling
          cmake -P scripts/EnsureLibtooling.cmake

          # Make distribution
          cmake -P scripts/MkDist.cmake Debug
