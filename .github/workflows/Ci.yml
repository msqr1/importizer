name: Tag Continuous
on:
  - push
  - workflow_dispatch
jobs:
  jobMatrix:
    uses: ./.github/workflows/JobMatrix.yml
    with:
      jqExpr: 'del(.[] | select(.os == "windows"))'
  all:
    permissions:
      contents: write
    needs: jobMatrix
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.jobMatrix.outputs.m) }}
    runs-on: ${{ matrix.runner }}
    name: ${{ matrix.os }}-${{ matrix.arch }}
    container: ${{ matrix.container || '' }}
    steps:
      - name: Checkout
        uses: taiki-e/checkout-action@v1.4.2
      - name: All
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Setup
          . scripts/setup-env/${{ matrix.script }} ${{ matrix.arch }}

          # Ensure LibTooling
          cmake -P scripts/libtooling/Ensure.cmake

          # Make distribution
          cmake -P scripts/MkDist.cmake Debug
