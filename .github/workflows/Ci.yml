name: Run test and tag continuous
on:
  - push
permissions:
  contents: write
defaults:
  run:
    shell: bash
jobs:
  get-matrix:
    runs-on: ubuntu-slim
    outputs:
      m: ${{ steps.get.outputs.m }}
    steps:
      - id: get
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo m=$(gh api repos/${{ github.repository }}/contents/CiMatrix.json \
            -H "Accept: application/vnd.github.raw+json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            | jq '.[] | select(.name != "windows")' -c) >> $GITHUB_OUTPUT
  build-test-pack-upload:
    needs: get-matrix
    strategy:
      matrix:
        include: ${{ fromJSON(needs.get-matrix.outputs.m) }}
    runs-on: ${{ matrix.runner }}
    name: ${{ matrix.name }}
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup, build (debug), test, pack
        id: all
        run: |
          # Setup
          . ./scripts/setup/${{ matrix.setup }}

          # Build
          cmake -B build \
            --preset ci-${{ matrix.name }} \
            -DBUILD_TESTING=1 \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCPACK_PACKAGE_FILE_NAME=importizer-${{ matrix.name }}
          cmake --build build \
            --config Debug \
            -j $(cmake -P scripts/Nproc.cmake)

          # Test
          cd build/tests
          ctest -C Debug \
            --output-on-failure \
            --progress \
            --schedule-random \
            -j $(cmake -P ../../scripts/Nproc.cmake)

          # Pack
          cd ..
          cpack -C Debug \
            -DCPACK_THREADS=$(cmake -P ../scripts/Nproc.cmake)
      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: ${{ github.workspace }}/build/importizer-${{ matrix.name }}.${{ matrix.archive-ext }}
          retention-days: 1
          compression-level: 0
          if-no-files-found: error
  download-tag-continuous:
    needs: build-test-pack-upload
    runs-on: ubuntu-slim
    steps:
      - name: Count distributions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          n_dist=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            -q ".total_count")
          if [ "$n_dist" -lt 3 ]; then
            exit 1
          fi
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: dists
      - name: Tag continuous release
        uses: softprops/action-gh-release@v3
        with:
          prerelease: true
          tag_name: continuous
          body: Latest test-passing debug release. Select your OS, download and try it
            out!
          files: dists/*
