name: Tag continuous
on:
  - push
permissions:
  contents: write
jobs:
  job-matrix:
    uses: ./.github/workflows/JobMatrix.yml
  make-dist:
    needs: job-matrix
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.job-matrix.outputs.m) }}
    runs-on: ${{ matrix.runner }}
    name: ${{ matrix.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup, build (debug), test, pack
        id: all
        run: |
          # Setup
          . ./scripts/setup/${{ matrix.setup }}

          # Configure
          cmake -B build -DCMAKE_BUILD_TYPE=Debug --preset ci-${{ matrix.name }} \
            -DBUILD_TESTING=1 -DCPACK_PACKAGE_FILE_NAME=importizer-${{ matrix.name }}

          # Build
          cmake --build build --config Debug -j $(cmake -P scripts/Nproc.cmake)

          # Test
          ctest --test-dir build/tests -C Debug --output-on-failure --progress \
            --schedule-random -j $(cmake -P scripts/Nproc.cmake)

          # Pack
          cpack --config build/CPackConfig.cmake -C Debug \
            -DCPACK_THREADS=$(cmake -P scripts/Nproc.cmake)
      - name: Upload
        uses: softprops/action-gh-release@v3
        with:
          prerelease: true
          tag_name: continuous
          target_commitish: ${{ github.sha }}
          files: importizer-${{ matrix.name }}${{ matrix.outExt }}
