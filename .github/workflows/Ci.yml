name: Tag Continuous
on:
  - push
  - workflow_dispatch
concurrency:
  group: ci
  cancel-in-progress: false
jobs:
  jobMatrix:
    uses: ./.github/workflows/JobMatrix.yml
  all:
    permissions:
      contents: write
    needs: jobMatrix
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.jobMatrix.outputs.m) }}
    runs-on: ${{ matrix.runner }}
    name: ${{ matrix.os }}-${{ matrix.arch }}
    container: ${{ matrix.container || '' }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: taiki-e/checkout-action@v1.4.2
      - name: Setup
        run: . scripts/setup-env/${{ matrix.script }} ${{ matrix.arch }}
      - name: Ensure LibTooling
        run: cmake -P scripts/libtooling/Ensure.cmake
      - name: Make distribution
        run: cmake -P scripts/MkDist.cmake Debug
