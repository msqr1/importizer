name: Run test and tag continuous
on:
  - push
  - workflow_dispatch
permissions:
  contents: write
jobs:
  build-test-pack-upload:
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            name: linux
            script-ext: "sh"
          - os: windows-latest
            name: windows
            script-ext: "ps1"
          - os: macos-14
            name: macos
            script-ext: "sh"
    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup
        run: scripts/SetupCI-${{ matrix.name }}.${{ matrix.script-ext }}
      - name: Build
        id: build
        run: |
          cmake -B build \
            --preset ci-${{ matrix.name }} \
            -DBUILD_TESTING=1 \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCPACK_PACKAGE_FILE_NAME=importizer-${{ matrix.name }}
          cmake --build build \
            --config Debug \
            -j $(cmake -P ${{ github.workspace }}/scripts/Nproc.cmake)
      - name: Test
        id: test
        run: |
          cd ${{ github.workspace }}/build/tests
          ctest -C Debug \
            --output-on-failure \
            --progress \
            --schedule-random \
            -j $(cmake -P ${{ github.workspace }}/scripts/Nproc.cmake)
      - name: Pack
        id: pack
        run: |
          cd ${{ github.workspace }}/build
          cpack -C Debug
      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: |
            ${{ github.workspace }}/build/importizer-${{ matrix.name }}.tar.gz
            ${{ github.workspace }}/build/importizer-${{ matrix.name }}.zip
          retention-days: 1
          compression-level: 0

  download-tag-continuous:
    needs: build-test-pack-upload
    runs-on: ubuntu-slim
    steps:
      - name: Download executables
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: executables
      - name: Tag continuous release
        uses: softprops/action-gh-release@v3
        with:
          prerelease: true
          tag_name: continuous
          body: Latest test-passing debug release. Select your OS, download and try it
            out!
          files: executables/*
