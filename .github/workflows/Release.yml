name: Tag release
on:
  - workflow_dispatch
permissions:
  contents: write
jobs:
  job-matrix:
    uses: ./.github/workflows/JobMatrix.yml
  make-dist:
    needs: job-matrix
    strategy:
      matrix:
        include: ${{ fromJSON(needs.job-matrix.outputs.m) }}
    runs-on: ${{ matrix.runner }}
    name: ${{ matrix.os }}-${{ matrix.arch }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
      - name: Setup
        run: . ./scripts/setup-ci/${{ matrix.script }} ${{ matrix.arch }}
      - name: Ensure LibTooling
        uses: ./.github/actions/ensure-libtooling
        with:
          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}
          script: ${{ matrix.script }}
          shell: ${{ matrix.shell }}
      - name: Build (release), test, pack
        shell: bash
        run: ./scripts/BuildTestPack.sh Release ${{ matrix.os }} ${{ matrix.arch }}
      - name: Upload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # 7.0.1
        with:
          name: ${{ matrix.name }}
          path: importizer-${{ matrix.os }}-${{ matrix.arch }}.${{ matrix.outExt }}
          retention-days: 1
          compression-level: 0
          if-no-files-found: error
  tag-release:
    needs: make-dist
    runs-on: ubuntu-slim
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # 8.0.1
        with:
          merge-multiple: true
          path: dists
      - name: Upload to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # 3.0.0
        with:
          tag_name: 3.0.0
          body: "[Change log](https://github.com/msqr1/importizer/blob/main/ChangeLog.asc#300)"
          files: dists/*
